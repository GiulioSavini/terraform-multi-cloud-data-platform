name: Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.9.0"
  TG_VERSION: "0.67.4"
  TFLINT_VERSION: "0.53.0"
  AWS_REGION: "eu-west-1"

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v${{ env.TFLINT_VERSION }}

      - name: Run TFLint
        run: |
          find . -name "*.tf" -exec dirname {} \; | sort -u | while read dir; do
            echo "::group::Linting $dir"
            tflint --chdir="$dir" --format=compact || true
            echo "::endgroup::"
          done

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Trivy (IaC scan)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: 0
          format: sarif
          output: trivy-results.sarif

      - name: Run Checkov
        run: |
          pip install -q checkov
          checkov -d . --quiet --compact --soft-fail \
            --framework terraform \
            --output cli --output sarif \
            --output-file-path console,results.sarif \
            || true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif
          category: checkov
        continue-on-error: true

  plan-dev:
    name: Plan (Dev)
    needs: [validate]
    if: vars.CLOUD_CREDENTIALS_CONFIGURED == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SA_EMAIL_DEV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: environments/dev
        run: |
          terraform plan -input=false -no-color -out=tfplan \
            -var-file=terraform.tfvars 2>&1 | tee plan_output.txt
          echo "plan_output<<HEREDOC" >> $GITHUB_OUTPUT
          cat plan_output.txt >> $GITHUB_OUTPUT
          echo "HEREDOC" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan_output }}`.substring(0, 65000);
            const body = `### Terraform Plan (Dev) ${{ steps.plan.outcome == 'success' && '✅' || '❌' }}

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  plan-prd:
    name: Plan (Prd)
    needs: [validate]
    if: github.ref == 'refs/heads/main' && vars.CLOUD_CREDENTIALS_CONFIGURED == 'true'
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PRD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PRD }}

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PRD }}
          service_account: ${{ secrets.GCP_SA_EMAIL_PRD }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/prd
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: environments/prd
        run: terraform plan -input=false -out=tfplan -var-file=terraform.tfvars

  apply-dev:
    name: Apply (Dev)
    needs: [plan-dev]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.CLOUD_CREDENTIALS_CONFIGURED == 'true'
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://console.aws.amazon.com
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SA_EMAIL_DEV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: environments/dev
        run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars

  apply-prd:
    name: Apply (Prd)
    needs: [plan-prd, apply-dev]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.CLOUD_CREDENTIALS_CONFIGURED == 'true'
    runs-on: ubuntu-latest
    environment:
      name: prd
      url: https://console.aws.amazon.com
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PRD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PRD }}

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PRD }}
          service_account: ${{ secrets.GCP_SA_EMAIL_PRD }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/prd
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: environments/prd
        run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars
